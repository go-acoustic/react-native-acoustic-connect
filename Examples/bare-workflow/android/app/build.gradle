import org.gradle.api.GradleException

apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    /* Folders */
    // Resolve react-native + codegen via Node so the same file works in
    // two layouts: (1) workspace dev — packages hoisted to the SDK
    // monorepo root; (2) standalone (published `next` branch of the
    // public repo) — packages in this app's own node_modules. No fixed
    // ../.. paths to maintain on RN bumps or repo re-layouts.
    //
    // `resolveNodeModule` defined at the bottom of this file throws a
    // Gradle-friendly exception with a clear message if `node` is
    // missing or the package isn't installed — preferable to the opaque
    // NPE you'd otherwise get from `new File("").parentFile`.
    def rnDir = resolveNodeModule('react-native', rootDir)
    def codegenDirResolved = resolveNodeModule('@react-native/codegen', rootDir)

    root = rnDir.parentFile.parentFile
    reactNativeDir = rnDir
    codegenDir = codegenDirResolved
    cliFile = new File(rnDir, "cli.js")

    /* Variants */
    //   The list of variants to that are debuggable. For those we're going to
    //   skip the bundling of the JS bundle and the assets. By default is just 'debug'.
    //   If you add flavors like lite, prod, etc. you'll have to list your debuggableVariants.
    // debuggableVariants = ["liteDebug", "prodDebug"]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]
    //
    //   The command to run when bundling. By default is 'bundle'
    // bundleCommand = "ram-bundle"
    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]

    /* Autolinking */
    autolinkLibrariesWithApp()
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = false

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = io.github.react-native-community:jsc-android-intl:2026004.+`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "co.acoustic.connect.demo.barewf"
    defaultConfig {
        applicationId "co.acoustic.connect.demo.barewf"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // Caution! In production, you need to generate your own keystore file.
            // see https://reactnative.dev/docs/signed-apk-android.
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

// Acoustic Connect config propagation — runs config.gradle so values from
// the demo's root ConnectConfig.json are written into the SDK's
// `assets/ConnectBasicConfig.properties` (and friends) at build time.
//
// scripts/gradleParser.js appends this `apply from:` line as the SDK's
// postinstall hook for npm-published installs. The hook does not fire
// for workspace members (npm doesn't re-run postinstall on workspace
// symlinks) or for the standalone published sample (already installed),
// so the line lives committed.
apply from: project(':react-native-acoustic-connect-beta').projectDir.getPath() + "/config.gradle"

// Resolve a Node package's directory via `node -p require.resolve(...)`.
// Throws a Gradle-friendly exception (not an opaque NPE) when Node is
// missing, the package isn't installed, or the resolver returns empty.
//
// Uses Process.waitForProcessOutput(stdout, stderr) — the idiomatic
// Groovy pattern that drains both pipes WHILE waiting. The alternative,
// proc.waitFor() before reading proc.inputStream.text, can deadlock if
// the child writes more than the OS pipe buffer (~64 KB) before exit.
// `node -p require.resolve` only emits a path or a stack trace (both
// well under the buffer), so the deadlock is impossible here in
// practice — but waitForProcessOutput costs nothing extra and removes
// the static-analysis flag forever.
//
// Not shared with settings.gradle: the pluginManagement {} closure
// delegate there is DefaultPluginManagementSpec, so script-level helpers
// aren't in scope from inside the block. The two-line inline pattern
// settings.gradle uses is simple enough that a separate helper would
// hide more than it would save.
static File resolveNodeModule(String moduleName, File baseDir) {
    def stdout = new StringBuilder()
    def stderr = new StringBuilder()
    def proc = ["node", "-p", "require.resolve('${moduleName}/package.json')"]
        .execute(null, baseDir)
    proc.waitForProcessOutput(stdout, stderr)
    if (proc.exitValue() != 0) {
        throw new GradleException(
            "Could not resolve Node module '${moduleName}' from ${baseDir}.\n" +
            "  • Is 'node' on PATH? (try `node --version`)\n" +
            "  • Did you run 'npm install' at the repo root?\n" +
            "stderr:\n${stderr.toString().trim()}"
        )
    }
    def out = stdout.toString().trim()
    if (out.isEmpty()) {
        throw new GradleException(
            "Empty path returned for '${moduleName}'. " +
            "Check that Node is healthy and 'npm install' completed."
        )
    }
    return new File(out).parentFile
}
